# Detection server configuration
model:
  weights: "yolov8n.pt"        # yolov8n / yolov8s / yolov8m
  conf_threshold: 0.4
  iou_threshold: 0.45
  use_tracker: true
  tracker: "bytetrack.yaml"

server:
  host: "0.0.0.0"
  port: 8000

# しりとりに不向きなクラスは除外
exclude_labels:
  - person

# 複数語クラスを 1 単語に正規化
label_normalize:
  cell phone: phone
  hot dog: hotdog
  dining table: table
  sports ball: ball
  tennis racket: racket
  wine glass: glass
  teddy bear: teddybear
  potted plant: plant
  stop sign: sign
  fire hydrant: hydrant
  parking meter: meter
  baseball bat: bat
  baseball glove: glove
  traffic light: light
